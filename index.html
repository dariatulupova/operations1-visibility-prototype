// For inherited elements, derive the effective rules on demand by combining
// the parent's current rules (read fresh each call) with this element's
// narrowed values and extra rules. This way any change to the parent's logic
// is automatically reflected in the child.
function buildEffectiveRules(element) {
  const v = element.visibility;
  if (!v) return [];
  if (v.type === 'conditional') return v.rules || [];
  if (v.type !== 'inherited') return [];
  const owner = findVisibilityOwner(element);
  const narrowed = v.narrowed || {};
  const extraRules = v.extraRules || [];
  if (!owner || !owner.element.visibility || owner.element.visibility.type !== 'conditional') {
    return extraRules;
  }
  const parentRules = owner.element.visibility.rules;
  const effective = parentRules.map(r => {
    if (r.op) return { id: 'inh-op-' + r.id, op: r.op, locked: true };
    return {
      id: 'inh-rule-' + r.id,
      classifier: r.classifier,
      values: narrowed[r.classifier] ? [...narrowed[r.classifier]] : [...r.values],
      allowedValues: [...r.values],
      notShow: !!r.notShow,
      locked: true,
    };
  });
  if (effective.length > 0 && extraRules.length > 0) {
    effective.push({ id: 'inh-bridge', op: 'AND', locked: true });
  }
  return effective.concat(extraRules);
}

function isLockedInhRuleId(id) { return typeof id === 'string' && id.startsWith('inh-rule-'); }
function isLockedInhOpId(id) { return typeof id === 'string' && (id.startsWith('inh-op-') || id === 'inh-bridge'); }

function narrowInheritedRule(element, lockedRuleId, newValues) {
  const v = element.visibility;
  if (v.type !== 'inherited') return;
  // Look up the parent rule by stripping the prefix
  const owner = findVisibilityOwner(element);
  if (!owner) return;
  const parentRule = owner.element.visibility.rules.find(r => r.id === lockedRuleId.replace('inh-rule-', ''));
  if (!parentRule) return;
  if (!v.narrowed) v.narrowed = {};
  // If the new values match the parent's exactly, remove the narrowing entry.
  const parentSet = new Set(parentRule.values);
  if (newValues.length === parentRule.values.length && newValues.every(x => parentSet.has(x))) {
    delete v.narrowed[parentRule.classifier];
  } else {
    v.narrowed[parentRule.classifier] = newValues.filter(x => parentSet.has(x));
  }
}

function findOpById(opId) {
  if (isLockedInhOpId(opId)) return { op: 'AND', locked: true }; // not directly modifiable
  const collect = (v) => {
    const arr = [];
    if (!v) return arr;
    if (v.rules) arr.push(...v.rules);
    if (v.extraRules) arr.push(...v.extraRules);
    return arr;
  };
  if (state.bulkDraft) {
    const op = collect(state.bulkDraft.visibility).find(r => r.id === opId && r.op);
    if (op) return op;
  }
  const allSteps = [...data.steps, ...data.modules.filter(m => m.step).map(m => m.step)];
  for (const step of allSteps) {
    let op = collect(step.visibility).find(r => r.id === opId && r.op);
    if (op) return op;
    for (const ps of step.processSteps) {
      op = collect(ps.visibility).find(r => r.id === opId && r.op);
      if (op) return op;
      for (const ix of ps.interactions) {
        op = collect(ix.visibility).find(r => r.id === opId && r.op);
        if (op) return op;
      }
    }
  }
  return null;
}

function findRule(ruleId) {
  if (isLockedInhRuleId(ruleId)) return null; // locked synthetic rules aren't directly modifiable
  const collect = (v) => {
    const arr = [];
    if (!v) return arr;
    if (v.rules) arr.push(...v.rules);
    if (v.extraRules) arr.push(...v.extraRules);
    return arr;
  };
  // Bulk draft rules
  if (state.bulkDraft) {
    const r = collect(state.bulkDraft.visibility).find(r => r.id === ruleId);
    if (r) return r;
  }
  const allSteps = [...data.steps, ...data.modules.filter(m => m.step).map(m => m.step)];
  for (const step of allSteps) {
    let r = collect(step.visibility).find(r => r.id === ruleId);
    if (r) return r;
    for (const ps of step.processSteps) {
      r = collect(ps.visibility).find(r => r.id === ruleId);
      if (r) return r;
      for (const ix of ps.interactions) {
        r = collect(ix.visibility).find(r => r.id === ruleId);
        if (r) return r;
      }
    }
  }
  return null;
}

function deleteRule(ruleId) {
  // Look in both v.rules (conditional) and v.extraRules (inherited extras).
  const allVis = [];
  if (state.bulkDraft && state.bulkDraft.visibility) allVis.push(state.bulkDraft.visibility);
  const allSteps = [...data.steps, ...data.modules.filter(m => m.step).map(m => m.step)];
  for (const step of allSteps) {
    if (step.visibility) allVis.push(step.visibility);
    for (const ps of step.processSteps) {
      if (ps.visibility) allVis.push(ps.visibility);
      for (const ix of ps.interactions) if (ix.visibility) allVis.push(ix.visibility);
    }
  }
  for (const vis of allVis) {
    for (const key of ['rules', 'extraRules']) {
      const arr = vis[key];
      if (!arr) continue;
      const idx = arr.findIndex(r => r.id === ruleId);
      if (idx < 0) continue;
      arr.splice(idx, 1);
      if (idx > 0 && arr[idx - 1] && arr[idx - 1].op) arr.splice(idx - 1, 1);
      else if (arr[idx] && arr[idx].op) arr.splice(idx, 1);
      if (key === 'rules') {
        if (arr.filter(r => !r.op).length === 0) {
          vis.type = 'always';
          delete vis.rules;
        }
      } else {
        if (arr.length === 0) delete vis.extraRules;
      }
      return;
    }
  }
}

function renderPreservingScroll(opts) {
  opts = opts || {};
  const scrollables = ['.info-layout', '.modules-layout', '.steps-main', '.steps-sidebar'];
  const saved = {};
  scrollables.forEach(sel => {
    const node = document.querySelector(sel);
    if (node) saved[sel] = node.scrollTop;
  });
  if (opts.resetMain) saved['.steps-main'] = 0;
  render();
  scrollables.forEach(sel => {
    const node = document.querySelector(sel);
    if (node && saved[sel] != null) node.scrollTop = saved[sel];
  });
}

function applyInheritedToStructure(source, cls, value) {
  if (!data.structureClasses[cls]) data.structureClasses[cls] = [];
  if (!data.structureClasses[cls].includes(value)) data.structureClasses[cls].push(value);
  const src = data.inheritedClassifiers[source];
  if (src && src[cls]) {
    src[cls] = src[cls].filter(v => v !== value);
    if (src[cls].length === 0) delete src[cls];
  }
  if (!data.appliedFromInherited[cls]) data.appliedFromInherited[cls] = {};
  data.appliedFromInherited[cls][value] = source;
}

function removeFromStructure(cls, value) {
  if (data.structureClasses[cls]) {
    data.structureClasses[cls] = data.structureClasses[cls].filter(v => v !== value);
    if (data.structureClasses[cls].length === 0) delete data.structureClasses[cls];
  }
  const tracked = data.appliedFromInherited[cls] && data.appliedFromInherited[cls][value];
  if (tracked) {
    const bucket = data.inheritedClassifiers[tracked];
    if (!bucket[cls]) bucket[cls] = [];
    if (!bucket[cls].includes(value)) bucket[cls].push(value);
    delete data.appliedFromInherited[cls][value];
    if (Object.keys(data.appliedFromInherited[cls]).length === 0) delete data.appliedFromInherited[cls];
    return tracked;
  }
  return null;
}

function hasDescendantWithOwnRules(element) {
  for (const step of data.steps) {
    if (step.id === element.id) {
      for (const ps of step.processSteps) {
        if (ps.visibility && (ps.visibility.type === 'conditional' || ps.visibility.type === 'governed')) return true;
        for (const ix of ps.interactions) {
          if (ix.visibility && (ix.visibility.type === 'conditional' || ix.visibility.type === 'governed')) return true;
        }
      }
      return false;
    }
    for (const ps of step.processSteps) {
      if (ps.id === element.id) {
        for (const ix of ps.interactions) {
          if (ix.visibility && (ix.visibility.type === 'conditional' || ix.visibility.type === 'governed')) return true;
        }
        return false;
      }
    }
  }
  return false;
}

function clearDescendantRules(element) {
  for (const step of data.steps) {
    if (step.id === element.id) {
      for (const ps of step.processSteps) {
        ps.visibility = { type: 'always' };
        for (const ix of ps.interactions) ix.visibility = { type: 'always' };
      }
      return;
    }
    for (const ps of step.processSteps) {
      if (ps.id === element.id) {
        for (const ix of ps.interactions) ix.visibility = { type: 'always' };
        return;
      }
    }
  }
}

// ===== Selection mode helpers =====
function getElementParentId(elementId) {
  for (const step of data.steps) {
    if (step.id === elementId) return null;
    for (const ps of step.processSteps) {
      if (ps.id === elementId) return step.id;
      for (const ix of ps.interactions) if (ix.id === elementId) return ps.id;
    }
  }
  return null;
}

function getDirectChildIds(elementId) {
  for (const step of data.steps) {
    if (step.id === elementId) return step.processSteps.map(ps => ps.id);
    for (const ps of step.processSteps) {
      if (ps.id === elementId) return ps.interactions.map(ix => ix.id);
    }
  }
  return [];
}

function getAllDescendantIds(elementId) {
  const out = [];
  for (const step of data.steps) {
    if (step.id === elementId) {
      for (const ps of step.processSteps) {
        out.push(ps.id);
        for (const ix of ps.interactions) out.push(ix.id);
      }
      return out;
    }
    for (const ps of step.processSteps) {
      if (ps.id === elementId) {
        for (const ix of ps.interactions) out.push(ix.id);
        return out;
      }
    }
  }
  return out;
}

function hasDescendantInSelected(elementId) {
  if (!state.selectionMode.selected) return false;
  return getAllDescendantIds(elementId).some(id => state.selectionMode.selected.has(id));
}

function selectionAddCascade(elementId) {
  const sel = state.selectionMode.selected;
  sel.add(elementId);
  for (const id of getAllDescendantIds(elementId)) sel.add(id);
  // Walk up: if all siblings of cur are selected, add parent
  let curId = elementId;
  while (true) {
    const parentId = getElementParentId(curId);
    if (!parentId) break;
    const directChildren = getDirectChildIds(parentId);
    if (directChildren.length && directChildren.every(id => sel.has(id))) {
      sel.add(parentId);
      curId = parentId;
    } else break;
  }
}

function selectionRemoveCascade(elementId) {
  const sel = state.selectionMode.selected;
  sel.delete(elementId);
  for (const id of getAllDescendantIds(elementId)) sel.delete(id);
  // Walk up: remove all ancestors (they're no longer fully selected)
  let curId = elementId;
  while (true) {
    const parentId = getElementParentId(curId);
    if (!parentId) break;
    sel.delete(parentId);
    curId = parentId;
  }
}

function selectionTopLevelIds() {
  // Top-level selected = elements whose parent is NOT in the selection
  const sel = state.selectionMode.selected;
  const out = [];
  for (const id of sel) {
    const parentId = getElementParentId(id);
    if (!parentId || !sel.has(parentId)) out.push(id);
  }
  return out;
}

function selectionHasElementsWithRules() {
  if (!state.selectionMode.selected) return false;
  for (const id of state.selectionMode.selected) {
    const f = findElement(id);
    if (!f) continue;
    const v = f.element.visibility;
    if (v && (v.type === 'conditional' || v.type === 'inherited' || v.type === 'governed')) {
      // Only "real" logic counts — inherited via parent in selection isn't an "existing rule"
      // For confirmation purposes, treat anything not 'always' as having rules.
      if (v.type !== 'always') return true;
    }
  }
  return false;
}

function applyBulkRules(rulesTemplate) {
  const tops = selectionTopLevelIds();
  for (const id of tops) {
    const f = findElement(id);
    if (!f) continue;
    f.element.visibility = {
      type: 'conditional',
      rules: rulesTemplate.map(r => {
        if (r.op) return { id: uid('op'), op: r.op };
        return { id: uid('r'), classifier: r.classifier, values: [...r.values], notShow: !!r.notShow };
      }),
    };
  }
}

function hasInheritedOverrides(element) {
  const v = element && element.visibility;
  if (!v || v.type !== 'inherited') return false;
  const hasNarrowed = v.narrowed && Object.keys(v.narrowed).length > 0;
  const hasExtras = v.extraRules && v.extraRules.length > 0;
  return !!(hasNarrowed || hasExtras);
}

function hasEmptyRules(element) {
  if (!element || !element.visibility) return false;
  const v = element.visibility;
  let rules = [];
  if (v.type === 'conditional') rules = v.rules || [];
  else if (v.type === 'inherited') rules = v.extraRules || [];
  return rules.some(r => !r.op && (!r.values || r.values.length === 0));
}

function effectiveRulesAsConditional(element) {
  const effective = buildEffectiveRules(element);
  return effective.map(r => {
    if (r.op) return { id: uid('op'), op: r.op };
    return { id: uid('r'), classifier: r.classifier, values: [...r.values], notShow: !!r.notShow };
  });
}

function deleteLogicFromInteraction(ix) {
  ix.visibility = { type: 'always' };
}

function deleteLogicFromProcessStep(ps, mode) {
  if (mode === 'keep') {
    // Snapshot each interaction's effective rules BEFORE detaching the PS
    const ixRules = new Map();
    for (const ix of ps.interactions) {
      if (ix.visibility && ix.visibility.type === 'inherited') {
        ixRules.set(ix.id, effectiveRulesAsConditional(ix));
      }
    }
    ps.visibility = { type: 'always' };
    for (const ix of ps.interactions) {
      if (ixRules.has(ix.id)) {
        ix.visibility = { type: 'conditional', rules: ixRules.get(ix.id) };
      } else {
        ix.visibility = ix.visibility || { type: 'always' };
      }
    }
  } else {
    ps.visibility = { type: 'always' };
    for (const ix of ps.interactions) ix.visibility = { type: 'always' };
  }
}

function deleteLogicFromStep(step, mode) {
  if (mode === 'keep') {
    // Snapshot effective rules for every descendant that's currently inherited
    const psRules = new Map();
    const ixRules = new Map();
    for (const ps of step.processSteps) {
      if (ps.visibility && ps.visibility.type === 'inherited') {
        psRules.set(ps.id, effectiveRulesAsConditional(ps));
      }
      for (const ix of ps.interactions) {
        if (ix.visibility && ix.visibility.type === 'inherited') {
          ixRules.set(ix.id, effectiveRulesAsConditional(ix));
        }
      }
    }
    step.visibility = { type: 'always' };
    for (const ps of step.processSteps) {
      if (psRules.has(ps.id)) {
        ps.visibility = { type: 'conditional', rules: psRules.get(ps.id) };
      }
      for (const ix of ps.interactions) {
        if (ixRules.has(ix.id) && ix.visibility && ix.visibility.type === 'inherited') {
          // It now inherits from the materialised PS — leave as inherited.
        } else if (ixRules.has(ix.id)) {
          ix.visibility = { type: 'conditional', rules: ixRules.get(ix.id) };
        }
      }
    }
  } else {
    step.visibility = { type: 'always' };
    for (const ps of step.processSteps) {
      ps.visibility = { type: 'always' };
      for (const ix of ps.interactions) ix.visibility = { type: 'always' };
    }
  }
}

function showConfirm({ title, message, onConfirm, confirmLabel, destructive, choices, defaultChoiceIndex }) {
  const overlay = document.getElementById('confirmOverlay');
  const okBtn = document.getElementById('confirmOk');
  const choicesEl = document.getElementById('confirmChoices');
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMessage').textContent = message;
  okBtn.textContent = confirmLabel || 'Continue';
  okBtn.classList.toggle('btn-danger', !!destructive);

  if (choices && choices.length) {
    const idx = defaultChoiceIndex ?? 0;
    choicesEl.classList.add('show');
    choicesEl.innerHTML = choices.map((c, i) => `
      <label class="confirm-choice ${i === idx ? 'selected' : ''}" data-choice-index="${i}">
        <input type="radio" name="confirm-choice" value="${i}" ${i === idx ? 'checked' : ''} />
        <span class="confirm-choice-text"><strong>${escape(c.label)}.</strong> ${escape(c.description || '')}</span>
      </label>
    `).join('');
    choicesEl.querySelectorAll('.confirm-choice').forEach(el => {
      el.onclick = () => {
        choicesEl.querySelectorAll('.confirm-choice').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        const input = el.querySelector('input');
        if (input) input.checked = true;
      };
    });
  } else {
    choicesEl.classList.remove('show');
    choicesEl.innerHTML = '';
  }

  overlay.classList.add('show');
  const close = () => overlay.classList.remove('show');
  document.getElementById('confirmCancel').onclick = close;
  okBtn.onclick = () => {
    close();
    let choiceValue = null;
    if (choices && choices.length) {
      const checked = choicesEl.querySelector('input[name="confirm-choice"]:checked');
      const i = checked ? parseInt(checked.value) : (defaultChoiceIndex ?? 0);
      choiceValue = choices[i].value;
    }
    onConfirm(choiceValue);
  };
}

function flipModuleMenusIfNeeded() {
  document.querySelectorAll('.module-menu.show').forEach(menu => {
    menu.classList.remove('above');
    const rect = menu.getBoundingClientRect();
    const viewportH = window.innerHeight;
    // If menu's bottom edge exceeds the viewport (with 12px buffer), flip above
    if (rect.bottom > viewportH - 12) {
      menu.classList.add('above');
    }
  });
}

function attachVisTagTooltips() {
  const tooltip = document.getElementById('globalTooltip');
  if (!tooltip) return;
  document.querySelectorAll('.vis-tag.conditional[data-tip]').forEach(el => {
    el.addEventListener('mouseenter', () => {
      tooltip.textContent = el.dataset.tip || '';
      tooltip.classList.add('show');
      positionTooltip(el, tooltip);
    });
    el.addEventListener('mouseleave', () => {
      tooltip.classList.remove('show');
      tooltip.style.transform = 'translate(-9999px, -9999px)';
    });
  });
}

function positionTooltip(target, tooltip) {
  // First put it off-screen but visible to measure size
  tooltip.style.transform = 'translate(-9999px, -9999px)';
  requestAnimationFrame(() => {
    const rect = target.getBoundingClientRect();
    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    const padding = 8;
    let left = rect.left + rect.width / 2 - tw / 2;
    let top = rect.top - th - 10;
    if (left < padding) left = padding;
    if (left + tw > window.innerWidth - padding) left = window.innerWidth - tw - padding;
    if (top < padding) top = rect.bottom + 10;
    tooltip.style.transform = `translate(${left}px, ${top}px)`;
  });
}

function toast(msg) {
  const t = document.getElementById('demoToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function escape(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s]));
}

// ===== Boot =====
render();
</script>
